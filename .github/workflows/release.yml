name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

jobs:
    build:
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      goos: linux
                      goarch: amd64
                      args: ""
                    - platform: windows-latest
                      target: x86_64-pc-windows-msvc
                      goos: windows
                      goarch: amd64
                      args: ""
                    - platform: macos-latest
                      target: aarch64-apple-darwin
                      goos: darwin
                      goarch: arm64
                      args: "--target aarch64-apple-darwin"

        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Build sidecar binaries
              run: |
                  mkdir -p app/src-tauri/binaries
                  ext=""
                  if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
                  CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o app/src-tauri/binaries/quant-api-${{ matrix.target }}${ext} ./api/cmd/api/main.go
                  CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o app/src-tauri/binaries/quant-cli-${{ matrix.target }}${ext} ./api/cmd/cli/main.go
              shell: bash

            - name: Install frontend dependencies
              run: cd app && bun install

            - name: Build Tauri
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: Quant ${{ github.ref_name }}
                  releaseBody: See the assets to download this version and install.
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
                  projectPath: app
