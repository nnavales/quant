root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/app ./api/cmd/main.go"
  bin = "./tmp/app"
  delay = 500
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "node_modules", "testdata"]
  exclude_regex = ["_test.go"]
  stop_on_error = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
