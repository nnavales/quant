root = "."
tmp_dir = "bin"

[build]
  cmd = "go build -o ./bin/app ./api/cmd/api/main.go"
  bin = "./bin/app"
  delay = 1000
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "node_modules", "testdata", "app"]
  exclude_regex = ["_test.go"]
  stop_on_error = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
